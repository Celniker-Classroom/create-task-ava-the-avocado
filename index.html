<!-- So for my project I am doing a guessing game where the person is guessing a word. I am going to have a list of the alphabet. So first, there is the date listed which under that the player can choose a level. Easy is a one word option, medium is three words, and hard is 5. Then you press play to start the game. There is a box that allows you to type in one letter at a time, you must press guess in order for it to run. There is also a give up button if they player wishes to use it. Once you press guess the letter you choose will be moved from Letters to guess to letters already guessed. Then if the letter is part of the word it will change one of the - that pop up when selecting a level. If you make a mistake with a letter than the number of mistakes goes up by one.-->



<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Word Guessing</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="styles.css">
</head>
 <body>

    <h1>Guess the Word:</h1>
    <p>Date:</p>

        <h3>Choose your level:</h3>
        <input type="radio" name="level" id="e" value="1" checked><label for="e">Easy</label><br>
        <input type="radio" name="level" id="m" value="3"><label for="m">Medium</label><br>
        <input type="radio" name="level" id="h" value="5"><label for="h">Hard</label><br><br>
        <button id="playBtn">Play</button>
      </div><br>
    <br>

    <div>
        <label for="letter-input">Type a letter:</label>
        <input type="text" id="letter-input" maxlength="1">
        
        <button type="button">Guess</button>
        <button type="button">Give Up</button>
    </div>

    <br>

    <div id="word-display">
        <p>Guess the word:</p>
    </div>

    <div id="alphabet-list">
        <p>Letters to guess:</p>
    </div>
        <div id="alreadyGuessed">
        <p>Letters already guessed:</p>
    </div>

      <div id="mistakes">
        <p>Mistakes:</p>
    </div>

</body>
</html>
