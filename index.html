<!-- So for my project I am doing a device that helps someone choose their meal throughout the day. They select whether they want breakfast, lunch, or dinner. Once they do that they press choose which allows the computer to run and select a dish from a list. The computer will show the original options from the that one list and then under that it will show the winner.-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>What to Eat?</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="styles.css">
</head>
 <body>

    <h1>What to Eat?</h1>

        <h3>Choose which meal:</h3>
        <input type="radio" name="level" id="e" value="1" checked><label for="e">Breakfast</label><br>
        <input type="radio" name="level" id="m" value="3"><label for="m">Lunch</label><br>
        <input type="radio" name="level" id="h" value="5"><label for="h">Dinner</label><br><br>
        <button id="playBtn">Choose</button>
      <br>


    <div id="word-display">
        <p>Enjoy eating:</p>
    </div>
</body>
</html>
